<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Efor Günlüğüm – MR – Derecepanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap&subset=latin-ext"
      rel="stylesheet"
    />
    <script src="../js/theme-boot.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .og-ef-suite {
        max-width: 72rem;
        margin: 0 auto;
        padding: 0.5rem 1rem 2.75rem;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      .og-ef-head {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--header-border, #e2e8f0);
      }
      .og-ef-head__eyebrow {
        margin: 0 0 0.35rem;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #64748b;
      }
      .og-ef-head h1 {
        margin: 0;
        font-size: 1.55rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #0f172a;
      }
      .og-ef-row {
        display: grid;
        gap: 1.25rem;
        margin-bottom: 1.5rem;
        align-items: stretch;
      }
      @media (min-width: 1024px) {
        .og-ef-row {
          grid-template-columns: minmax(0, 35%) minmax(0, 65%);
        }
      }
      .og-ef-card {
        border-radius: 18px;
        border: 1px solid var(--header-border, #e2e8f0);
        background: linear-gradient(160deg, #fff 0%, #f8fafc 100%);
        box-shadow: 0 14px 40px -24px rgba(15, 23, 42, 0.35);
        padding: 1.35rem 1.35rem 1.45rem;
      }
      .og-ef-card h2 {
        margin: 0 0 1rem;
        font-size: 1rem;
        font-weight: 800;
        color: #0f172a;
      }
      .og-ef-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .og-ef-grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        align-items: start;
      }
      @media (max-width: 480px) {
        .og-ef-grid2 {
          grid-template-columns: 1fr;
        }
      }
      .font-bold {
        font-weight: 700;
      }
      .text-xs {
        font-size: 0.75rem;
        line-height: 1.35;
      }
      .text-slate-500 {
        color: #64748b;
      }
      .og-ef-field label {
        display: block;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 0.4rem;
      }
      .og-ef-field input,
      .og-ef-field select {
        width: 100%;
        box-sizing: border-box;
        padding: 0.75rem 0.85rem;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        font: inherit;
        font-size: 0.92rem;
        font-weight: 500;
        color: #0f172a;
        background: #fff;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .og-ef-field input:focus,
      .og-ef-field select:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }
      .og-ef-submit {
        width: 100%;
        margin-top: 0.35rem;
        padding: 0.95rem 1.35rem;
        border: 0;
        border-radius: 12px;
        font: inherit;
        font-size: 0.95rem;
        font-weight: 800;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, #3730a3, #4f46e5 45%, #6366f1);
        box-shadow: 0 14px 32px -12px rgba(67, 56, 202, 0.65);
        transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
      }
      .og-ef-submit:hover {
        transform: translateY(-1px);
        filter: brightness(1.06);
        box-shadow: 0 18px 36px -12px rgba(67, 56, 202, 0.72);
      }
      .og-ef-chart-host {
        position: relative;
        min-height: 300px;
      }
      #og-ef-bar {
        min-height: 300px;
      }
      .og-ef-bar-skel {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: linear-gradient(110deg, #f1f5f9 0%, #f8fafc 40%, #e2e8f0 50%, #f8fafc 60%, #f1f5f9 100%);
        background-size: 200% 100%;
        animation: og-ef-skel-shine 1.35s ease-in-out infinite;
        z-index: 1;
        display: none;
      }
      .og-ef-bar-skel.is-on {
        display: block;
      }
      @keyframes og-ef-skel-shine {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }
      .og-empty {
        display: none;
        position: absolute;
        inset: 0;
        z-index: 2;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
        border-radius: 14px;
        border: 1px dashed #cbd5e1;
        background: radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.08), transparent 55%), #fafafa;
      }
      .og-empty.is-on {
        display: flex;
      }
      .og-empty__icon {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 0.9rem;
        background: linear-gradient(135deg, #e0e7ff, #f1f5f9);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6366f1;
        margin-bottom: 0.85rem;
      }
      .og-empty__icon svg {
        width: 1.5rem;
        height: 1.5rem;
      }
      .og-empty__title {
        margin: 0;
        font-size: 0.9375rem;
        font-weight: 700;
        color: #334155;
        max-width: 18rem;
        line-height: 1.45;
      }
      .og-ef-table-wrap {
        border-radius: 16px;
        border: 1px solid var(--header-border, #e2e8f0);
        overflow: hidden;
        background: #fff;
      }
      .og-ef-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.86rem;
      }
      .og-ef-table th {
        text-align: left;
        padding: 0.7rem 0.9rem;
        font-size: 0.65rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #64748b;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
      }
      .og-ef-tr {
        transition: background-color 0.15s ease;
      }
      .og-ef-tr:hover {
        background: #f8fafc;
      }
      .og-ef-td {
        padding: 0.7rem 0.9rem;
        border-bottom: 1px solid #f1f5f9;
        color: #0f172a;
      }
      .og-ef-td--num {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
      }
      .og-ef-td--muted {
        text-align: center;
        color: #334155;
        font-weight: 600;
      }
      .og-ef-td--act {
        width: 3.5rem;
        text-align: center;
      }
      .og-ef-iconbtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.25rem;
        height: 2.25rem;
        border: 0;
        border-radius: 10px;
        background: #fef2f2;
        color: #b91c1c;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, transform 0.12s;
      }
      .og-ef-iconbtn:hover {
        background: #fee2e2;
        color: #7f1d1d;
        transform: scale(1.05);
      }
      .og-ef-table-empty {
        padding: 2.5rem 1rem !important;
        border-bottom: 0 !important;
      }
      .og-ef-table-empty .og-empty {
        position: relative;
        inset: auto;
        display: flex;
        border: 0;
        background: transparent;
        padding: 0;
      }
      .og-ef-table-empty .og-empty__title {
        max-width: 22rem;
      }
    </style>
  </head>
  <body class="og-student-embed">
    <main class="og-ef-suite">
      <header class="og-ef-head">
        <p class="og-ef-head__eyebrow">Etkileşim merkezi</p>
        <h1>Efor günlüğüm</h1>
      </header>

      <div class="og-ef-row">
        <section class="og-ef-card" aria-labelledby="og-ef-form-title">
          <h2 id="og-ef-form-title">Günlük Efor Ekle</h2>
          <form id="og-ef-form" class="og-ef-form" autocomplete="off">
            <div class="og-ef-field">
              <label for="og-ef-ders">Ders (YKS müfredat)</label>
              <select id="og-ef-ders" required></select>
            </div>
            <div class="og-ef-field">
              <label for="og-ef-ders-diger">Ders adı (yalnızca «Diğer…»)</label>
              <input type="text" id="og-ef-ders-diger" placeholder="Örn. Almanca" hidden />
            </div>
            <div class="og-ef-field">
              <label for="eforKonu">Konu (seçilen branşın müfredatı)</label>
              <select id="eforKonu">
                <option value="">Konu seçin…</option>
              </select>
              <input type="text" id="efor-konu-serbest" placeholder="Konu adını yazın" hidden />
            </div>
            <div class="og-ef-field">
              <label for="eforKavram">Kavram / alt başlık</label>
              <input id="eforKavram" type="text" placeholder="Örn. Ana düşünce, limit, asit-baz…" />
            </div>
            <div class="og-ef-field">
              <label for="eforKitap">Çalışılan kaynak / kitap (koç ataması)</label>
              <select id="eforKitap">
                <option value="">Kaynak seçin…</option>
                <option value="__own__">Okul kitabı / Kendi kaynağım</option>
              </select>
            </div>
            <div class="og-ef-grid2">
              <div class="og-ef-field">
                <label for="og-ef-soru">Çözülen soru sayısı</label>
                <input type="number" id="og-ef-soru" min="0" step="1" required placeholder="0" />
              </div>
              <div class="og-ef-field">
                <label for="og-ef-dk">Çalışma süresi (dk)</label>
                <input type="number" id="og-ef-dk" min="0" step="1" required placeholder="0" />
              </div>
            </div>
            <button type="submit" class="og-ef-submit">Kaydet</button>
          </form>
        </section>
        <section class="og-ef-card" aria-labelledby="og-ef-chart-title">
          <h2 id="og-ef-chart-title">Son 7 Günlük Aktivite</h2>
          <div class="og-ef-chart-host">
            <div id="og-ef-bar-skel" class="og-ef-bar-skel" aria-hidden="true"></div>
            <div id="og-ef-empty-chart" class="og-empty" role="status">
              <div class="og-empty__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z" />
                  <path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" />
                </svg>
              </div>
              <p class="og-empty__title">Henüz analiz edilecek veri bulunamadı</p>
            </div>
            <div id="og-ef-bar" aria-label="Son yedi gün çözülen soru grafiği"></div>
          </div>
        </section>
      </div>

      <section class="og-ef-card" aria-labelledby="og-ef-table-title">
        <h2 id="og-ef-table-title">Kayıtlarım</h2>
        <div class="og-ef-table-wrap">
          <table class="og-ef-table">
            <thead>
              <tr>
                <th scope="col">Tarih</th>
                <th scope="col">Ders &amp; konu</th>
                <th scope="col">Kaynak / kitap</th>
                <th scope="col">Soru</th>
                <th scope="col">Dk</th>
                <th scope="col">İşlem</th>
              </tr>
            </thead>
            <tbody id="og-ef-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../js/theme.js" defer></script>
    <script src="../js/student-catalog.js"></script>
    <script src="../js/og-student-perf.js"></script>
    <script src="../js/exam-matrix.js"></script>
    <script src="../js/ogrenci-mr-core.js"></script>
    <script src="../js/fascicle-coach-bridge.js"></script>
    <script src="../js/library-store.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1"></script>
    <script src="../js/yks-mufredat.js"></script>
    <script src="../js/ogrenci-mr-efor.js" defer></script>
  </body>
</html>
