<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kurucu Girişi – DerecePanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap&subset=latin-ext"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
            },
            boxShadow: {
              "kurucu-card":
                "0 24px 48px -12px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(139, 92, 246, 0.12), 0 0 80px -20px rgba(88, 28, 135, 0.35)",
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#0b0914] text-slate-200 antialiased">
    <div
      class="min-h-screen flex items-center justify-center px-4 py-12 bg-[radial-gradient(ellipse_at_top,_rgba(88,28,135,0.22),_transparent_55%),radial-gradient(ellipse_at_bottom,_rgba(0,229,153,0.06),_transparent_50%)]"
    >
      <div
        class="w-full max-w-[420px] rounded-2xl border border-purple-500/15 bg-[#12101c]/90 backdrop-blur-sm p-8 sm:p-10 shadow-kurucu-card"
        role="region"
        aria-labelledby="kurucu-login-title"
      >
        <div class="flex flex-col items-center text-center mb-8">
          <div
            class="mb-4 flex h-14 w-14 items-center justify-center rounded-xl bg-[#0b0914] ring-1 ring-[#00e599]/40 shadow-[0_0_24px_rgba(0,229,153,0.25)]"
            aria-hidden="true"
          >
            <svg class="h-8 w-8 text-[#00e599]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <h1 id="kurucu-login-title" class="text-2xl sm:text-[1.65rem] font-extrabold tracking-tight">
            <span class="text-[#00e599]">DerecePanel</span>
            <span class="text-slate-100"> KURUCU</span>
          </h1>
          <p class="mt-2 text-sm text-slate-500">Yalnızca yetkili kurucu hesapları</p>
        </div>

        <form id="sa-login-form" class="space-y-5" action="#" method="post" autocomplete="on">
          <div>
            <label for="sa-username" class="mb-1.5 block text-xs font-medium uppercase tracking-wider text-slate-500">Kullanıcı adı</label>
            <input
              id="sa-username"
              name="username"
              type="text"
              autocomplete="username"
              required
              class="w-full rounded-xl border border-purple-500/20 bg-black px-4 py-3.5 text-sm text-slate-100 placeholder:text-slate-600 focus:border-[#00e599]/50 focus:ring-2 focus:ring-[#00e599]/20 outline-none transition"
              placeholder=""
            />
          </div>
          <div>
            <label for="sa-password" class="mb-1.5 block text-xs font-medium uppercase tracking-wider text-slate-500">Şifre</label>
            <input
              id="sa-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="w-full rounded-xl border border-purple-500/20 bg-black px-4 py-3.5 text-sm text-slate-100 placeholder:text-slate-600 focus:border-[#00e599]/50 focus:ring-2 focus:ring-[#00e599]/20 outline-none transition"
              placeholder=""
            />
          </div>
          <button
            type="submit"
            class="mt-2 w-full rounded-xl bg-[#00e599] px-4 py-3.5 text-center text-[15px] font-bold text-black shadow-[0_0_28px_rgba(0,229,153,0.35)] hover:bg-[#33f0b3] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#00e599] transition"
          >
            Giriş yap
          </button>
        </form>

        <p class="mt-6 text-center text-xs text-slate-500 leading-relaxed">Yetkili oturum gerektirir.</p>
      </div>
    </div>
    <script src="../js/super-admin-login.js" defer></script>
    <script src="../js/bug-reporter.js" defer></script>
  </body>
</html>
