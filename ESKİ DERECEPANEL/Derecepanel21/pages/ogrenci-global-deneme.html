<!DOCTYPE html>
<html lang="tr" data-dgt-readonly="1" data-dnm-context="global-ogr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Deneme Takvimi – Öğrenci – Derecepanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=latin-ext" rel="stylesheet" />
    <script src="../js/theme-boot.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .og-embed-page {
        padding: 1rem 1rem 2rem;
        background: #f9f7f2;
      }
      .og-embed-page .dgt-page {
        max-width: 1100px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body class="og-embed-page og-student-embed">
    <div class="dgt-page">
      <header class="dgt-hero">
        <h1 class="dgt-hero__title">Global Deneme Takvimi</h1>
      </header>

      <div class="dgt-cockpit">
        <div class="dgt-top-split">
          <div class="dgt-cal-col">
            <section class="dgt-cal-shell dgt-cal-shell--compact" aria-label="Aylık takvim">
              <div class="dgt-cal-header">
                <button type="button" class="dgt-cal-nav-btn" id="dgt-cal-prev" aria-label="Önceki ay">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M15 18l-6-6 6-6" />
                  </svg>
                </button>
                <h2 id="dgt-cal-title" class="dgt-cal-title">—</h2>
                <button type="button" class="dgt-cal-nav-btn" id="dgt-cal-next" aria-label="Sonraki ay">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M9 18l6-6-6-6" />
                  </svg>
                </button>
              </div>
              <div class="dgt-cal__grid" id="dgt-cal-grid"></div>
              <div class="dgt-cal-day" id="dgt-cal-day-panel" aria-live="polite">
                <div class="dgt-cal-day__head">
                  <h3 class="dgt-cal-day__title" id="dgt-cal-day-title">Seçilen günün denemeleri</h3>
                  <button type="button" class="dgt-link" id="dgt-clear-day" hidden>Seçimi temizle</button>
                </div>
                <p class="dgt-cal-day__hint" id="dgt-cal-day-hint">
                  Takvimden bir güne tıklayın; o güne ait denemeler burada listelenir.
                </p>
                <div id="dgt-cal-day-list" class="dgt-cal-day-list" role="list" hidden></div>
              </div>
            </section>
          </div>

          <aside class="dgt-nearest" aria-label="En yakın denemeler">
            <div class="dgt-nearest__head">
              <h2 class="dgt-nearest__title">En yakın 5 deneme</h2>
              <p class="dgt-nearest__sub">Bugünden itibaren sıradaki sınavlar (tür filtresine göre).</p>
            </div>
            <div id="dgt-nearest-list" class="dgt-nearest-list" role="list"></div>
          </aside>
        </div>

        <section class="dgt-list-section" aria-label="Deneme listesi">
          <div class="dgt-list-section__head">
            <div class="dgt-list-section__intro">
              <h2 id="dgt-panel-title" class="dgt-list-section__title">Yaklaşan denemeler</h2>
              <p id="dgt-panel-sub" class="dgt-list-section__sub">Salt okunur görünüm.</p>
            </div>
          </div>

          <div class="dgt-toolbar dgt-toolbar--above-list" role="region" aria-label="Liste filtreleri">
            <div class="dgt-toolbar__left">
              <span class="dgt-label">Sınav türü</span>
              <div class="dgt-segment" id="dgt-filter-tur" role="group" aria-label="Sınav türü filtresi">
                <button type="button" class="dgt-segment__btn" data-dgt-tur="TYT">TYT</button>
                <button type="button" class="dgt-segment__btn" data-dgt-tur="AYT">AYT</button>
                <button type="button" class="dgt-segment__btn" data-dgt-tur="YDT">YDT</button>
                <button type="button" class="dgt-segment__btn" data-dgt-tur="YKS">YKS</button>
                <button type="button" class="dgt-segment__btn dgt-segment__btn--active" data-dgt-tur="all">Tümü</button>
              </div>
            </div>
            <div class="dgt-toolbar__right">
              <label class="dgt-label dgt-label--inline" for="dgt-filter-ay">Liste ayı</label>
              <select id="dgt-filter-ay" class="dgt-select" aria-label="Aşağıdaki tablo için ay filtresi"></select>
            </div>
          </div>

          <div class="kdy-filter-bar" role="region" aria-label="Deneme ara ve filtrele">
            <div class="kdy-filter-bar__search">
              <svg class="kdy-filter-bar__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
              </svg>
              <input type="search" id="dgt-filter-search" class="kdy-filter-input" placeholder="Deneme adı ile ara…" autocomplete="off" aria-label="Deneme adı ile ara" />
            </div>
            <label class="kdy-filter-field">
              <span class="kdy-filter-field__label">Sınav Türü</span>
              <select id="dgt-filter-tur-select" class="kdy-filter-select" aria-label="Sınav türü filtresi">
                <option value="all">Tümü</option>
                <option value="TYT">TYT</option>
                <option value="AYT">AYT</option>
                <option value="YDT">YDT</option>
                <option value="YKS">YKS</option>
              </select>
            </label>
            <label class="kdy-filter-field">
              <span class="kdy-filter-field__label">Yayınevi</span>
              <select id="dgt-filter-yayinevi" class="kdy-filter-select" aria-label="Yayınevi filtresi">
                <option value="">Tümü</option>
              </select>
            </label>
            <p class="kdy-filter-count" id="dgt-filter-count" aria-live="polite"></p>
          </div>

          <div class="dgt-exam-table-wrap">
            <table class="dgt-exam-table dgt-exam-table--dense">
              <thead>
                <tr>
                  <th scope="col">Deneme</th>
                  <th scope="col">Tarih</th>
                  <th scope="col">Saat</th>
                  <th scope="col">Tür</th>
                  <th scope="col">Yayınevi</th>
                </tr>
              </thead>
              <tbody id="dgt-exam-table-body"></tbody>
            </table>
          </div>
          <div class="dgt-table-footer">
            <div class="dgt-table-footer__left">
              <label class="dgt-page-size" for="dgt-page-size">
                <span class="dgt-label dgt-label--footer">Sayfa başına</span>
                <select id="dgt-page-size" class="dgt-select dgt-select--compact" aria-label="Sayfa başına kayıt">
                  <option value="10" selected>10</option>
                  <option value="20">20</option>
                  <option value="50">50</option>
                </select>
              </label>
              <span id="dgt-page-meta" class="dgt-page-meta" aria-live="polite"></span>
            </div>
            <div class="dgt-table-footer__nav">
              <button type="button" class="dgt-icon-btn dgt-icon-btn--nav" id="dgt-page-prev" aria-label="Önceki sayfa">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M15 18l-6-6 6-6" />
                </svg>
              </button>
              <button type="button" class="dgt-icon-btn dgt-icon-btn--nav" id="dgt-page-next" aria-label="Sonraki sayfa">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M9 18l6-6-6-6" />
                </svg>
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script src="../js/theme.js" defer></script>
    <script src="../js/denemeler-global-takvim.js" defer></script>
  </body>
</html>
