<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YKS Konuları – Derecepanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=latin-ext"
      rel="stylesheet"
    />
    <script src="../js/theme-boot.js"></script>
    <script src="../js/og-student-perf.js"></script>
    <script src="../js/ogrenci-yks-embed.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .yks-sim {
        padding: 0 1.5rem 2.5rem;
        max-width: 1400px;
      }
      .yks-sim__lead {
        margin: -0.25rem 0 1.25rem;
        font-size: 0.9rem;
        color: var(--text-muted, #64748b);
        line-height: 1.5;
      }
      .yks-sim-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
        padding: 0.35rem;
        border-radius: 0.85rem;
        background: var(--surface-muted, #f1f5f9);
        border: 1px solid var(--header-border, #e2e8f0);
      }
      .yks-sim-tab {
        flex: 1;
        min-width: 200px;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.75rem 1rem;
        border-radius: 0.65rem;
        background: transparent;
        color: var(--text-muted, #64748b);
        transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
      }
      .yks-sim-tab:hover {
        color: var(--text-primary, #0f172a);
        background: rgba(255, 255, 255, 0.55);
      }
      .yks-sim-tab[aria-selected="true"] {
        background: var(--surface-elevated, #fff);
        color: var(--text-primary, #0f172a);
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
      }
      .yks-sim-panel[hidden] {
        display: none !important;
      }
      .yks-konu-list__item--row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        flex-wrap: wrap;
      }
      .yks-konu-list__txt {
        flex: 1;
        min-width: 0;
      }
      .yks-konu-done {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-muted, #64748b);
        cursor: pointer;
        user-select: none;
      }
      .yks-konu-done input {
        width: 1rem;
        height: 1rem;
        accent-color: #6366f1;
      }
      .yks-filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.75rem 1rem;
        align-items: end;
        padding: 1rem 1.1rem;
        border-radius: 0.85rem;
        border: 1px solid var(--header-border, #e2e8f0);
        background: var(--surface-elevated, #fff);
        margin-bottom: 1rem;
      }
      .yks-filter-grid label {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted, #64748b);
      }
      .yks-filter-grid input,
      .yks-filter-grid select {
        font: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.5rem 0.65rem;
        border-radius: 0.5rem;
        border: 1px solid var(--header-border, #e2e8f0);
        background: var(--surface, #fff);
        color: var(--text-primary, #0f172a);
      }
      .yks-filter-actions {
        display: flex;
        align-items: flex-end;
      }
      .yks-btn-filter {
        width: 100%;
        padding: 0.55rem 1rem;
        border-radius: 0.5rem;
        border: none;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: #fff;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }
      .yks-btn-filter:hover {
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
      }
      .yks-btn-filter:active {
        transform: scale(0.98);
      }
      .yks-wizard-hint {
        font-size: 0.78rem;
        color: var(--text-muted, #64748b);
        margin: 0 0 0.75rem;
        line-height: 1.45;
      }
      .yks-table-wrap {
        border-radius: 0.85rem;
        border: 1px solid var(--header-border, #e2e8f0);
        overflow: auto;
        max-height: min(70vh, 720px);
        background: var(--surface-elevated, #fff);
      }
      .yks-table-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 1rem;
        font-size: 0.8125rem;
        color: var(--text-muted, #64748b);
        border-bottom: 1px solid var(--header-border, #e2e8f0);
      }
      table.yks-atlas-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
      }
      .yks-atlas-table thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        text-align: left;
        padding: 0.65rem 0.75rem;
        background: var(--surface-muted, #f8fafc);
        border-bottom: 2px solid var(--header-border, #e2e8f0);
        font-weight: 700;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--text-muted, #475569);
        white-space: nowrap;
      }
      .yks-atlas-table tbody td {
        padding: 0.55rem 0.75rem;
        border-bottom: 1px solid var(--header-border, #e2e8f0);
        vertical-align: top;
      }
      .yks-atlas-table tbody tr:nth-child(even) {
        background: rgba(148, 163, 184, 0.06);
      }
      .yks-atlas-table tbody tr:hover td {
        background: rgba(99, 102, 241, 0.06);
      }
      .yks-skeleton-host {
        position: relative;
        min-height: 280px;
        border-radius: 0.85rem;
        overflow: hidden;
      }
      .yks-skeleton-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: rgba(248, 250, 252, 0.92);
        z-index: 4;
        backdrop-filter: blur(4px);
      }
      [data-theme="dark"] .yks-skeleton-overlay {
        background: rgba(15, 23, 42, 0.88);
      }
      .yks-skeleton-spinner {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 3px solid rgba(99, 102, 241, 0.25);
        border-top-color: #6366f1;
        animation: yksSpin 0.85s linear infinite;
      }
      @keyframes yksSpin {
        to {
          transform: rotate(360deg);
        }
      }
      .yks-skeleton-msg {
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-primary, #0f172a);
        text-align: center;
        max-width: 22rem;
        line-height: 1.45;
      }
      .yks-skeleton-sub {
        font-size: 0.8rem;
        color: var(--text-muted, #64748b);
      }
      .yks-skeleton-bars {
        width: 100%;
        max-width: 480px;
        padding: 0 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }
      .yks-sk-bar {
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #e2e8f0 0%, #f1f5f9 40%, #e2e8f0 80%);
        background-size: 200% 100%;
        animation: yksShimmer 1.2s ease-in-out infinite;
      }
      [data-theme="dark"] .yks-sk-bar {
        background: linear-gradient(90deg, #334155 0%, #475569 40%, #334155 80%);
        background-size: 200% 100%;
      }
      @keyframes yksShimmer {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }
      .yks-acc-root {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .yks-acc-block {
        border-radius: 0.85rem;
        border: 1px solid var(--header-border, #e2e8f0);
        overflow: hidden;
        background: var(--surface-elevated, #fff);
      }
      .yks-acc-block__head {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.85rem 1rem;
        border: none;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(14, 165, 233, 0.06));
        font: inherit;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        text-align: left;
        color: var(--text-primary, #0f172a);
      }
      .yks-acc-block__head svg {
        flex-shrink: 0;
        transition: transform 0.25s ease;
      }
      .yks-acc-block.is-open .yks-acc-block__head svg {
        transform: rotate(180deg);
      }
      .yks-acc-block__body {
        display: none;
        border-top: 1px solid var(--header-border, #e2e8f0);
      }
      .yks-acc-block.is-open .yks-acc-block__body {
        display: block;
      }
      .yks-course {
        border-bottom: 1px solid var(--header-border, #e2e8f0);
      }
      .yks-course:last-child {
        border-bottom: none;
      }
      .yks-course__head {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        border: none;
        background: var(--surface, #fff);
        font: inherit;
        cursor: pointer;
        text-align: left;
      }
      .yks-course__head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }
      .yks-course__title {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-primary, #0f172a);
      }
      .yks-course__chev {
        flex-shrink: 0;
        opacity: 0.5;
        transition: transform 0.2s ease;
      }
      .yks-course.is-open .yks-course__chev {
        transform: rotate(180deg);
      }
      .yks-progress {
        height: 6px;
        border-radius: 999px;
        background: var(--surface-muted, #e2e8f0);
        overflow: hidden;
      }
      .yks-progress__fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #22c55e, #4ade80);
        width: 0%;
        transition: width 0.35s ease;
      }
      .yks-progress__label {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-muted, #64748b);
      }
      .yks-course__body {
        display: none;
        padding: 0 0.5rem 0.65rem 1.25rem;
      }
      .yks-course.is-open .yks-course__body {
        display: block;
      }
      .yks-topic-row {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        padding: 0.35rem 0;
        font-size: 0.84rem;
        line-height: 1.4;
      }
      .yks-topic-row input {
        margin-top: 0.2rem;
        width: 1rem;
        height: 1rem;
        accent-color: #6366f1;
        cursor: pointer;
      }
      .yks-topic-row label {
        cursor: pointer;
        flex: 1;
        color: var(--text-primary, #1e293b);
      }
      .yks-muf-note {
        font-size: 0.78rem;
        color: var(--text-muted, #64748b);
        margin: 0 0 1rem;
      }
      .atlas-error-banner {
        margin-bottom: 1rem;
        padding: 1rem 1.1rem;
        border-radius: 0.75rem;
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #991b1b;
      }
      .atlas-error-banner__title {
        display: block;
        font-size: 0.95rem;
      }
      .atlas-error-banner__detail {
        margin: 0.35rem 0 0;
        font-size: 0.875rem;
        color: #7f1d1d;
      }
      [data-theme="dark"] .atlas-error-banner {
        background: rgba(127, 29, 29, 0.25);
        border-color: #b91c1c;
        color: #fecaca;
      }
      [data-theme="dark"] .atlas-error-banner__detail {
        color: #fecaca;
      }
      .yks-konu-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .yks-konu-list__item {
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--header-border, #e2e8f0);
        font-size: 0.875rem;
        color: var(--text-primary, #334155);
        line-height: 1.45;
      }
      .yks-konu-list__item:last-child {
        border-bottom: none;
      }
    </style>
  </head>
  <body class="og-partial-page">
    <main class="main og-partial-main">
                <header class="dp-topbar-sheet flex flex-wrap items-center justify-between gap-3 sm:flex-nowrap w-full p-3 mb-6 bg-slate-50/50 border border-slate-200 rounded-2xl shadow-sm">

          <div class="flex items-center gap-4 flex-1 max-w-2xl">
            <button onclick="window.history.back()" class="w-10 h-10 shrink-0 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 flex items-center justify-center transition-colors text-slate-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6"/>
              </svg>
            </button>

            <div class="relative w-full">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
              </div>
              <input type="text" id="fm-global-search" class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-700 placeholder:text-slate-400" placeholder="Öğrenci, deneme, koç veya konu ara...">

              <div id="fm-search-results" class="absolute w-full bg-white shadow-2xl border border-slate-100 rounded-2xl mt-2 z-50 hidden max-h-[400px] overflow-y-auto p-2" role="listbox" aria-label="Arama sonuçları"></div>
            </div>
          </div>

          <div class="flex items-center gap-3 shrink-0 ml-4">

            <button type="button" id="dp-header-notify" class="w-10 h-10 shrink-0 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 flex items-center justify-center transition-colors text-slate-600" aria-label="Bildirimler">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
              </svg>
            </button>

            <button type="button" id="dp-header-theme" class="w-10 h-10 shrink-0 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 flex items-center justify-center transition-colors text-slate-600" aria-label="Tema değiştir">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
              </svg>
            </button>

            <div class="header-profile-wrap shrink-0" data-header-profile>
              <button type="button" class="header-profile__trigger dp-topbar-profile-trigger" id="headerProfileTrigger" aria-expanded="false" aria-haspopup="menu" aria-controls="headerProfileMenu">
                <span id="headerAvatarContainer" title="Profil" aria-hidden="true">?</span>
              </button>
              <div id="headerProfileMenu" class="header-profile__menu" hidden role="menu">
                <div class="header-profile__menu-inner">
                  <div class="header-profile__hero" role="none">
                    <span class="header-profile__hero-avatar" id="headerProfileMenuAvatar" aria-hidden="true">?</span>
                    <div class="header-profile__hero-text">
                      <p class="header-profile__name" id="headerProfileName"></p>
                      <p class="header-profile__meta" id="headerProfileMeta"></p>
                    </div>
                  </div>
                  <div class="header-profile__list">
                    <button type="button" class="header-profile__row" role="menuitem" data-profile-open="detay">
                      <span class="header-profile__row-label">Detay</span>
                      <svg class="header-profile__row-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <button type="button" class="header-profile__row" role="menuitem" data-profile-open="duzenle">
                      <span class="header-profile__row-label">Düzenle</span>
                      <svg class="header-profile__row-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                  </div>
                  <div class="header-profile__sep" role="separator"></div>
                  <button type="button" class="header-profile__row header-profile__row--logout btn-logout" role="menuitem">
                    <span class="header-profile__row-label">Çıkış yap</span>
                    <svg class="header-profile__row-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
              </div>
            </div>

          </div>

        </header>
        <h1 class="page-title">YKS Konuları</h1>
        <div class="yks-sim">
          <p class="yks-sim__lead">
            TYT ve AYT müfredat konu başlıkları; bilgi amaçlı salt metin listesidir.
          </p>

          <div id="yks-konu-error" class="atlas-error-banner" role="alert" hidden style="display: none">
            <strong class="atlas-error-banner__title">Veriler yüklenemedi</strong>
            <p id="yks-konu-error-text" class="atlas-error-banner__detail"></p>
          </div>

          <div id="mufredat-root" class="yks-acc-root" aria-busy="true">
            <p class="yks-skeleton-msg" id="mufredat-placeholder">Müfredat yükleniyor…</p>
          </div>
        </div>
      </main>

    <!-- Ortak shell: theme.js (tema), app.js (menü / davranış) -->
    <script src="../js/yks-standalone-shell.js" defer></script>
    <script src="../js/theme.js" defer></script>
    <script src="../js/app.js" defer></script>
    <script src="../js/global-search.js" defer></script>
    <script src="../js/panel-header.js" defer></script>
    <script src="../js/student-catalog.js" defer></script>
    <script src="../js/ogrenci-sim-bridge.js" defer></script>
    <script src="../js/yks-konulari.js" defer></script>
    </body>
</html>
