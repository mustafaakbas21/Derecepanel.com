<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gelişim Trendi – MR – Derecepanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap&subset=latin-ext"
      rel="stylesheet"
    />
    <script src="../js/theme-boot.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .og-tr-suite {
        max-width: 72rem;
        margin: 0 auto;
        padding: 0.5rem 1rem 2.75rem;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      .og-tr-head {
        margin-bottom: 1.35rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--header-border, #e2e8f0);
      }
      .og-tr-head__eyebrow {
        margin: 0 0 0.35rem;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #64748b;
      }
      .og-tr-head h1 {
        margin: 0;
        font-size: 1.55rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #0f172a;
      }
      .og-tr-kpis {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin-bottom: 1.35rem;
      }
      @media (min-width: 768px) {
        .og-tr-kpis {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 1100px) {
        .og-tr-kpis {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      .og-tr-kpi {
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        background: linear-gradient(165deg, #fff 0%, #f8fafc 100%);
        padding: 1.1rem 1.15rem 1.15rem;
        box-shadow: 0 12px 36px -22px rgba(15, 23, 42, 0.25);
      }
      .og-tr-kpi__lab {
        display: block;
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 0.45rem;
      }
      .og-tr-kpi strong {
        font-size: 1.65rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #0f172a;
        font-variant-numeric: tabular-nums;
      }
      .og-tr-kpi--delta strong {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        color: #15803d;
      }
      .og-tr-kpi--delta.is-neg strong {
        color: #b91c1c;
      }
      .og-tr-kpi__arrow {
        display: inline-flex;
        width: 1.65rem;
        height: 1.65rem;
        border-radius: 9999px;
        background: #dcfce7;
        align-items: center;
        justify-content: center;
        color: #16a34a;
      }
      .og-tr-kpi--delta.is-neg .og-tr-kpi__arrow {
        background: #fee2e2;
        color: #dc2626;
        transform: rotate(180deg);
      }
      .og-tr-chart-card {
        border-radius: 20px;
        border: 1px solid var(--header-border, #e2e8f0);
        background: linear-gradient(165deg, #fff 0%, #f8fafc 100%);
        box-shadow: 0 18px 50px -28px rgba(15, 23, 42, 0.3);
        padding: 1.25rem 1rem 1.35rem;
      }
      .og-tr-chart-card h2 {
        margin: 0 0 0.35rem;
        font-size: 1.05rem;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.02em;
      }
      .og-tr-chart-card p.sub {
        margin: 0 0 1rem;
        font-size: 0.8rem;
        color: #64748b;
        font-weight: 500;
      }
      .og-tr-chart-host {
        position: relative;
        min-height: 400px;
      }
      #og-tr-line {
        min-height: 400px;
      }
      .og-tr-skel {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: linear-gradient(110deg, #f1f5f9 0%, #f8fafc 40%, #e2e8f0 50%, #f8fafc 60%, #f1f5f9 100%);
        background-size: 200% 100%;
        animation: og-tr-skel-shine 1.35s ease-in-out infinite;
        z-index: 1;
        display: none;
      }
      .og-tr-skel.is-on {
        display: block;
      }
      @keyframes og-tr-skel-shine {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }
      .og-tr-empty {
        display: none;
        position: absolute;
        inset: 0;
        z-index: 2;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
        border-radius: 14px;
        border: 1px dashed #cbd5e1;
        background: radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.08), transparent 55%), #fafafa;
      }
      .og-tr-empty.is-on {
        display: flex;
      }
      .og-tr-empty__icon {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 0.9rem;
        background: linear-gradient(135deg, #e0e7ff, #f1f5f9);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6366f1;
        margin-bottom: 0.85rem;
      }
      .og-tr-empty__icon svg {
        width: 1.5rem;
        height: 1.5rem;
      }
      .og-tr-empty__title {
        margin: 0;
        font-size: 0.9375rem;
        font-weight: 700;
        color: #334155;
        max-width: 20rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body class="og-student-embed">
    <main class="og-tr-suite">
      <header class="og-tr-head">
        <p class="og-tr-head__eyebrow">Salt okunur</p>
        <h1>Gelişim trendi</h1>
      </header>

      <div class="og-tr-kpis" id="og-tr-kpis" aria-label="Özet göstergeler">
        <article class="og-tr-kpi">
          <span class="og-tr-kpi__lab">İlk denemem (Net)</span>
          <strong id="og-tr-kpi-first">—</strong>
        </article>
        <article class="og-tr-kpi">
          <span class="og-tr-kpi__lab">Son denemem (Net)</span>
          <strong id="og-tr-kpi-last">—</strong>
        </article>
        <article class="og-tr-kpi og-tr-kpi--delta" id="og-tr-kpi-delta-wrap">
          <span class="og-tr-kpi__lab">Net artışı</span>
          <strong id="og-tr-kpi-delta">
            <span class="og-tr-kpi__arrow" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 19V5M5 12l7-7 7 7" />
              </svg>
            </span>
            <span id="og-tr-kpi-delta-num">—</span>
          </strong>
        </article>
        <article class="og-tr-kpi" id="og-tr-kpi-mood-card">
          <span class="og-tr-kpi__lab">Strateji Merkezi · ruh hali</span>
          <strong id="og-tr-kpi-mood-val">—</strong>
          <p id="og-tr-kpi-mood-hint" style="margin: 0.35rem 0 0; font-size: 0.72rem; font-weight: 600; color: #64748b; line-height: 1.35"></p>
        </article>
      </div>

      <section class="og-tr-chart-card" aria-labelledby="og-tr-chart-title">
        <h2 id="og-tr-chart-title">Gelişim grafiği</h2>
        <p class="sub">Deneme bazlı net; TYT ve AYT ayrı eğriler (lacivert / turkuaz).</p>
        <div class="og-tr-chart-host">
          <div id="og-tr-skel" class="og-tr-skel" aria-hidden="true"></div>
          <div id="og-tr-empty" class="og-tr-empty" role="status">
            <div class="og-tr-empty__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z" />
                <path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12" />
              </svg>
            </div>
            <p class="og-tr-empty__title">Henüz analiz edilecek veri bulunamadı</p>
          </div>
          <div id="og-tr-line" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="../js/theme.js" defer></script>
    <script src="../js/student-catalog.js"></script>
    <script src="../js/og-student-perf.js"></script>
    <script src="../js/exam-matrix.js"></script>
    <script src="../js/ogrenci-mr-core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1"></script>
    <script src="../js/ogrenci-mr-trend.js" defer></script>
  </body>
</html>
