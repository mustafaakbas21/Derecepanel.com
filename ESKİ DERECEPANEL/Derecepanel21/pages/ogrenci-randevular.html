<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Randevularım – Öğrenci – Derecepanel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&subset=latin-ext" rel="stylesheet" />
    <script src="../js/theme-boot.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .ogr-rnd {
        max-width: 56rem;
        margin: 0 auto;
        padding: 1rem 1rem 2rem;
      }
      .ogr-rnd__head h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text-primary, #0f172a);
      }
      .ogr-rnd__head p {
        margin: 0 0 1.25rem;
        font-size: 0.88rem;
        color: var(--text-muted, #64748b);
        line-height: 1.5;
      }
      .ogr-rnd__tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
        padding: 0.35rem;
        border-radius: 12px;
        background: color-mix(in srgb, var(--header-border, #e2e8f0) 35%, transparent);
      }
      .ogr-rnd__tab {
        flex: 1;
        border: 0;
        cursor: pointer;
        padding: 0.65rem 1rem;
        border-radius: 10px;
        font: inherit;
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-muted, #64748b);
        background: transparent;
        transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
      }
      .ogr-rnd__tab--active {
        color: var(--text-primary, #0f172a);
        background: var(--surface-elevated, #fff);
        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
      }
      .ogr-rnd__panel[hidden] {
        display: none !important;
      }
      .ogr-rnd__list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .ogr-rnd-card {
        border-radius: 16px;
        padding: 1.15rem 1.25rem;
        background: var(--surface-elevated, #fff);
        border: 1px solid var(--header-border, #e2e8f0);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }
      .ogr-rnd-card__row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem 1rem;
      }
      .ogr-rnd-card__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem 1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-primary, #0f172a);
      }
      .ogr-rnd-card__pill {
        display: inline-flex;
        align-items: center;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: color-mix(in srgb, var(--btn-primary-bg, #6366f1) 12%, transparent);
        color: var(--btn-primary-bg, #6366f1);
      }
      .ogr-rnd-card__pill--in {
        background: rgba(34, 197, 94, 0.12);
        color: #15803d;
      }
      .ogr-rnd-card__pill--ff {
        background: rgba(59, 130, 246, 0.12);
        color: #1d4ed8;
      }
      .ogr-rnd-card__konu {
        margin: 0.5rem 0 0;
        font-size: 0.92rem;
        color: var(--text-muted, #64748b);
        line-height: 1.45;
      }
      .ogr-rnd-card__konu strong {
        color: var(--text-primary, #0f172a);
      }
      .ogr-rnd__empty {
        margin: 0;
        padding: 2rem 1rem;
        text-align: center;
        font-size: 0.92rem;
        color: var(--text-muted, #64748b);
        border-radius: 16px;
        border: 1px dashed var(--header-border, #e2e8f0);
        background: color-mix(in srgb, var(--surface-muted, #f8fafc) 88%, transparent);
      }
      .ogr-rnd__btn-zoom {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        margin-top: 0.85rem;
        padding: 0.55rem 1rem;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
        font: inherit;
        font-size: 0.86rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        text-decoration: none;
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .ogr-rnd__btn-zoom:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.42);
      }
    </style>
  </head>
  <body class="og-student-embed">
    <div class="ogr-rnd">
      <header class="ogr-rnd__head">
        <h1>Randevularım</h1>
        <p>Koçunuzun oluşturduğu görüşmeler; yaklaşan ve geçmiş randevularınızı buradan takip edebilirsiniz.</p>
      </header>

      <div class="ogr-rnd__tabs" role="tablist" aria-label="Randevu sekmeleri">
        <button type="button" class="ogr-rnd__tab ogr-rnd__tab--active" id="ogr-rnd-tab-upcoming" role="tab" aria-selected="true">Gelecek Randevular</button>
        <button type="button" class="ogr-rnd__tab" id="ogr-rnd-tab-past" role="tab" aria-selected="false">Geçmiş Randevular</button>
      </div>

      <div id="ogr-rnd-upcoming" class="ogr-rnd__list ogr-rnd__panel" role="tabpanel"></div>
      <div id="ogr-rnd-past" class="ogr-rnd__list ogr-rnd__panel" hidden role="tabpanel"></div>

      <p id="ogr-rnd-empty-up" class="ogr-rnd__empty" hidden>Bu sekmede randevu yok.</p>
      <p id="ogr-rnd-empty-past" class="ogr-rnd__empty" hidden>Bu sekmede randevu yok.</p>
    </div>

    <script src="../js/student-catalog.js"></script>
    <script src="../js/theme.js" defer></script>
    <script src="../js/ogrenci-randevular.js" defer></script>
  </body>
</html>
