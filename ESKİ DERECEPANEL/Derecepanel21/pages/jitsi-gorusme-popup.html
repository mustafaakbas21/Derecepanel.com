<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Görüntülü Görüşme – Derecepanel</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0f172a;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      }
      #dp-jitsi-status {
        display: none;
        padding: 14px 16px;
        font-size: 13px;
        font-weight: 600;
        color: #fecaca;
        background: #450a0a;
        border-bottom: 1px solid #7f1d1d;
      }
      #dp-jitsi-root {
        width: 100%;
        height: 100%;
        min-height: 320px;
      }
    </style>
  </head>
  <body>
    <div id="dp-jitsi-status" role="alert"></div>
    <div id="dp-jitsi-root"></div>
    <script>
      (function () {
        "use strict";

        function showErr(msg) {
          var el = document.getElementById("dp-jitsi-status");
          if (!el) return;
          el.style.display = "block";
          el.textContent = msg;
        }

        var params = new URLSearchParams(window.location.search);
        var room = String(params.get("room") || "").trim();
        var displayName = "Derecepanel Koç";
        try {
          var dn = params.get("displayName");
          if (dn) displayName = decodeURIComponent(dn);
        } catch (e) {}

        if (!room || !/^[a-zA-Z0-9_.-]+$/.test(room)) {
          showErr("Geçersiz veya eksik oda adı. Bu pencereyi kapatıp tekrar deneyin.");
          return;
        }

        var script = document.createElement("script");
        script.src = "https://meet.jit.si/external_api.js";
        script.async = true;
        script.onload = function () {
          try {
            if (typeof JitsiMeetExternalAPI === "undefined") {
              showErr("Jitsi API yüklenemedi. Bağlantınızı kontrol edin.");
              return;
            }
            var parent = document.getElementById("dp-jitsi-root");
            if (!parent) {
              showErr("Oda konteyneri bulunamadı.");
              return;
            }
            new JitsiMeetExternalAPI("meet.jit.si", {
              roomName: room,
              parentNode: parent,
              width: "100%",
              height: "100%",
              userInfo: { displayName: displayName },
              configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false,
              },
              interfaceConfigOverwrite: {
                TOOLBAR_ALWAYS_VISIBLE: true,
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
              },
            });
          } catch (err) {
            showErr("Oda başlatılamadı: " + (err && err.message ? err.message : String(err)));
          }
        };
        script.onerror = function () {
          showErr("Jitsi betiği yüklenemedi (ağ veya güvenlik duvarı).");
        };
        document.head.appendChild(script);
      })();
    </script>
  </body>
</html>
