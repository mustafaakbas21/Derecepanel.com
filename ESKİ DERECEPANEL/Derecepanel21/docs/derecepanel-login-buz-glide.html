<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e1b2e" />
    <title>DerecePanel — Giriş (buz kayması)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --dp-slate: #1a2332;
        --dp-slate-elev: #222d3f;
        --dp-border: rgba(255, 255, 255, 0.08);
        --dp-muted: rgba(226, 232, 240, 0.72);
        --dp-ink: #f1f5f9;
        --dp-accent: #7dd3fc;
        --dp-link: #93c5fd;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Inter", system-ui, sans-serif;
        color: var(--dp-ink);
        overflow-x: hidden;
      }

      /* Görsel kullanımı: image_29baf5.jpg dosyasını bu HTML ile aynı klasöre koyup aşağıdaki
         background satırının başına ekleyebilirsiniz:
         url('image_29baf5.jpg') center/cover no-repeat,
      */

      /* --- Arka plan: serin mavi–mor + soyut şekiller --- */
      .dp-page {
        position: relative;
        min-height: 100dvh;
        isolation: isolate;
        background:
          radial-gradient(ellipse 120% 80% at 20% 10%, rgba(147, 112, 219, 0.35) 0%, transparent 50%),
          radial-gradient(ellipse 100% 70% at 85% 20%, rgba(56, 189, 248, 0.22) 0%, transparent 45%),
          radial-gradient(ellipse 80% 60% at 50% 100%, rgba(99, 102, 241, 0.28) 0%, transparent 55%),
          linear-gradient(165deg, #0f172a 0%, #1e1b4b 38%, #172554 72%, #0c4a6e 100%);
      }

      .cool-shapes {
        position: fixed;
        inset: -12%;
        z-index: 0;
        pointer-events: none;
        transition: transform 0.5s ease;
        will-change: transform;
      }

      .cool-shapes.shift {
        transform: translate3d(-2.8%, 1.6%, 0);
      }

      .cool-shapes__blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(64px);
        opacity: 0.55;
      }

      .cool-shapes__blob--1 {
        width: 48vmin;
        height: 48vmin;
        top: 8%;
        left: 12%;
        background: rgba(139, 92, 246, 0.45);
      }

      .cool-shapes__blob--2 {
        width: 62vmin;
        height: 62vmin;
        bottom: -8%;
        right: -6%;
        background: rgba(34, 211, 238, 0.28);
      }

      .cool-shapes__blob--3 {
        width: 36vmin;
        height: 36vmin;
        top: 42%;
        right: 18%;
        background: rgba(99, 102, 241, 0.4);
      }

      .cool-shapes__arc {
        position: absolute;
        width: 120vmin;
        height: 120vmin;
        top: -30%;
        right: -25%;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 50%;
        opacity: 0.35;
      }

      /* --- Üst: Giriş Yap / marka --- */
      .dp-header {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: clamp(1rem, 3vw, 1.5rem) clamp(1.25rem, 4vw, 2rem);
      }

      .dp-header__brand {
        font-size: 0.9375rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: rgba(241, 245, 249, 0.92);
        text-decoration: none;
      }

      .dp-header__brand:hover {
        color: #fff;
      }

      .dp-header__actions {
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }

      .dp-header__giris {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--dp-link);
        text-decoration: none;
        background: none;
        border: none;
        padding: 0.35rem 0.25rem;
        cursor: pointer;
        font-family: inherit;
      }

      .dp-header__giris:hover {
        text-decoration: underline;
      }

      .dp-header__login {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--dp-ink);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      .dp-header__login:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .dp-header__login:active {
        transform: scale(0.98);
      }

      .dp-header__login-mark {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        display: grid;
        place-items: center;
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #0f172a;
      }

      /* --- Merkez sahne: kart --- */
      .dp-stage {
        position: relative;
        z-index: 1;
        min-height: calc(100dvh - 8rem);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem clamp(1rem, 4vw, 2rem) 5rem;
      }

      #loginCard {
        position: relative;
        width: 100%;
        max-width: 400px;
        padding: clamp(1.5rem, 4vw, 2rem);
        border-radius: 20px;
        background: linear-gradient(165deg, var(--dp-slate-elev) 0%, var(--dp-slate) 100%);
        border: 1px solid var(--dp-border);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        opacity: 0;
        transform: translateX(100%);
        transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s;
        will-change: transform, opacity;
      }

      #loginCard.show {
        transform: translateX(0);
        opacity: 1;
      }

      /* Buzumsu ince doku (SVG noise + hafif buz çizgileri) */
      #loginCard::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0.22;
        mix-blend-mode: soft-light;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 180px 180px;
      }

      #loginCard::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0.12;
        background:
          linear-gradient(105deg, rgba(255, 255, 255, 0.12) 0%, transparent 42%),
          linear-gradient(-18deg, transparent 55%, rgba(125, 211, 252, 0.08) 100%);
      }

      .login-card__inner {
        position: relative;
        z-index: 1;
      }

      .login-card__brand {
        text-align: center;
        margin-bottom: 1.5rem;
      }

      .login-card__brand-logo {
        font-size: 1.125rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        color: var(--dp-ink);
        margin: 0 0 0.35rem;
      }

      .login-card__brand-tag {
        margin: 0;
        font-size: 0.6875rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--dp-muted);
      }

      .login-field {
        margin-bottom: 0.85rem;
      }

      .login-field label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--dp-muted);
        margin-bottom: 0.35rem;
      }

      .login-field input {
        width: 100%;
        padding: 0.7rem 0.85rem;
        font-size: 0.9375rem;
        color: var(--dp-ink);
        background: rgba(15, 23, 42, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .login-field input::placeholder {
        color: rgba(148, 163, 184, 0.75);
      }

      .login-field input:focus {
        border-color: rgba(125, 211, 252, 0.45);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
      }

      .login-card__submit {
        width: 100%;
        margin-top: 0.35rem;
        padding: 0.8rem 1rem;
        font-size: 0.9375rem;
        font-weight: 600;
        color: #0f172a;
        background: linear-gradient(180deg, #e0f2fe 0%, var(--dp-accent) 100%);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: filter 0.2s ease, transform 0.15s ease;
      }

      .login-card__submit:hover {
        filter: brightness(1.05);
      }

      .login-card__submit:active {
        transform: scale(0.99);
      }

      .login-card__links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem 1.25rem;
        margin-top: 1.25rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      .login-card__links a {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--dp-link);
        text-decoration: none;
      }

      .login-card__links a:hover {
        text-decoration: underline;
      }

      /* --- Alt metin --- */
      .dp-footer-note {
        position: fixed;
        z-index: 2;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 1rem 1.25rem 1.25rem;
        text-align: center;
        font-size: 0.75rem;
        font-weight: 500;
        color: rgba(226, 232, 240, 0.55);
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        #loginCard,
        .cool-shapes {
          transition: none;
        }

        #loginCard {
          transform: translateX(0);
          opacity: 1;
        }

        .cool-shapes.shift {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="dp-page">
      <div class="cool-shapes" id="coolShapes" aria-hidden="true">
        <div class="cool-shapes__blob cool-shapes__blob--1"></div>
        <div class="cool-shapes__blob cool-shapes__blob--2"></div>
        <div class="cool-shapes__blob cool-shapes__blob--3"></div>
        <div class="cool-shapes__arc"></div>
      </div>

      <header class="dp-header">
        <a class="dp-header__brand" href="#">derecepanel</a>
        <div class="dp-header__actions">
          <button type="button" class="dp-header__giris" id="triggerGirisText" aria-controls="loginCard">Giriş</button>
          <button type="button" class="dp-header__login" id="triggerGiris" aria-controls="loginCard">
            <span class="dp-header__login-mark" aria-hidden="true">DP</span>
            Giriş Yap
          </button>
        </div>
      </header>

      <div class="dp-stage">
        <article id="loginCard" aria-labelledby="loginCardTitle">
          <div class="login-card__inner">
            <div class="login-card__brand">
              <h1 class="login-card__brand-logo" id="loginCardTitle">DERECEPANEL</h1>
              <p class="login-card__brand-tag">Akademik performans paneli</p>
            </div>

            <form class="login-card__form" action="#" method="post" autocomplete="on">
              <div class="login-field">
                <label for="idField">TC No / E-Posta</label>
                <input id="idField" name="identifier" type="text" placeholder="TC kimlik veya e-posta" autocomplete="username" />
              </div>
              <div class="login-field">
                <label for="pwdField">Şifre</label>
                <input id="pwdField" name="password" type="password" placeholder="••••••••" autocomplete="current-password" />
              </div>
              <button type="submit" class="login-card__submit">Giriş Yap</button>
            </form>

            <nav class="login-card__links" aria-label="Yasal ve iletişim">
              <a href="#">KVKK Metni</a>
              <a href="#">İletişim</a>
            </nav>
          </div>
        </article>
      </div>

      <p class="dp-footer-note">Yapay zeka destekli analiz ve raporlama ile öğrenci başarısını net görün.</p>
    </div>

    <script>
      (function () {
        "use strict";

        var card = document.getElementById("loginCard");
        var shapes = document.getElementById("coolShapes");
        var trigger = document.getElementById("triggerGiris");
        var triggerText = document.getElementById("triggerGirisText");

        /** @type {boolean} */
        var revealed = false;

        function revealLogin() {
          if (revealed || !card) return;
          revealed = true;
          card.classList.add("show");
          if (shapes) shapes.classList.add("shift");
        }

        function wireTrigger(el) {
          if (!el) return;
          el.addEventListener("click", function () {
            revealLogin();
          });
        }

        wireTrigger(trigger);
        wireTrigger(triggerText);

        /* Senaryo: sayfa yüklendikten 1 sn sonra otomatik başlat (isteğe bağlı — tıklama ile de tetiklenir) */
        window.setTimeout(revealLogin, 1000);

        /* Form: demo — sayfa yenilenmesin */
        var form = document.querySelector(".login-card__form");
        if (form) {
          form.addEventListener("submit", function (e) {
            e.preventDefault();
          });
        }
      })();
    </script>
  </body>
</html>
